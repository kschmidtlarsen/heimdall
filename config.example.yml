# Heimdall — OAuth 2.1 gateway config
# Mounted at /etc/heimdall/config.yml in the container.
# Secrets (GITHUB_CLIENT_ID, GITHUB_CLIENT_SECRET, JWT_SECRET) come from env, never here.

issuer: https://heimdall.exe.pm

github:
  login_allowlist:
    - kschmidtlarsen

jwt:
  # access-token lifetime in seconds (15 min)
  ttl_seconds: 900

# Path slug → upstream MCP container on Bifrost network.
# Resource identifier for slug "cos-mcp" is https://heimdall.exe.pm/cos-mcp
# RS metadata is at https://heimdall.exe.pm/.well-known/oauth-protected-resource/cos-mcp
# MCP endpoint Claude Desktop connects to: https://heimdall.exe.pm/cos-mcp/mcp
#
# Slugs MUST be lowercase, [a-z0-9-]+, and must NOT collide with reserved paths
# (health, authorize, token, register, oauth, .well-known).
mcps:
  cos-mcp:
    upstream: http://cos-mcp:8080
    description: "Chief of Staff CRM (read-only)"
  kanban-mcp:
    upstream: http://kanban-mcp:8080
    description: "Kanban board (currently read-only)"
  muninn:
    upstream: http://muninn-mcp:8080
    description: "Muninn — Kristian's personality, preferences, goals, dreams, calendar (read-only)"
